services:
  # ─── Spring Boot Web Service ───────────────────────────────────────────────
  - type: web
    name: cicd-pipeline-platform
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free

    # Environment variables set at deploy time
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod

      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: cicd-pipeline-db
          property: connectionString

      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: cicd-pipeline-db
          property: user

      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: cicd-pipeline-db
          property: password

      - key: JWT_SECRET
        generateValue: true        # Render auto-generates a secure random value

      - key: JWT_EXPIRATION_MS
        value: "86400000"          # 24 hours

      - key: ALLOWED_ORIGINS
        value: "*"                 # Lock down to your frontend URL after deploy

    healthCheckPath: /actuator/health

  # ─── PostgreSQL Database ───────────────────────────────────────────────────
databases:
  - name: cicd-pipeline-db
    plan: free
    databaseName: pipeline_db
    user: pipeline_user

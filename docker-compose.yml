version: '3.8'

services:

  # ============================
  # PostgreSQL Database
  # ============================
  postgres:
    image: postgres:16-alpine
    container_name: pipeline-postgres
    environment:
      POSTGRES_DB: pipelinedb
      POSTGRES_USER: autorabit
      POSTGRES_PASSWORD: autorabit123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autorabit -d pipelinedb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pipeline-network

  # ============================
  # Redis (Pub/Sub & Cache)
  # ============================
  redis:
    image: redis:7-alpine
    container_name: pipeline-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - pipeline-network

  # ============================
  # Spring Boot Application
  # ============================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pipeline-monitor
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pipelinedb
      DB_USERNAME: autorabit
      DB_PASSWORD: autorabit123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - pipeline-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  pipeline-network:
    driver: bridge

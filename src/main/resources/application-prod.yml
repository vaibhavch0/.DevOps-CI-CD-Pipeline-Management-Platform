spring:
  config:
    activate:
      on-profile: prod

  datasource:
    # Railway PostgreSQL provides individual PG* vars — use them to build JDBC URL
    # Do NOT use DATABASE_URL directly — Railway gives postgresql:// not jdbc:postgresql://
    url: jdbc:postgresql://${PGHOST}:${PGPORT:5432}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      # Required for Railway PostgreSQL SSL
      data-source-properties:
        sslmode: require

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  # Disable Redis — not available on free tier
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration

  cache:
    type: simple

jwt:
  secret: ${JWT_SECRET:fallback-secret-change-in-railway-vars}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

server:
  port: ${PORT:8080}   # Railway injects PORT automatically

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

logging:
  level:
    com.autorabit: INFO
    org.springframework.security: WARN
    com.zaxxer.hikari: WARN

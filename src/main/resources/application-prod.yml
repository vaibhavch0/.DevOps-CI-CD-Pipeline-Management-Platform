spring:
  config:
    activate:
      on-profile: prod

  datasource:
    # Railway PostgreSQL plugin sets DATABASE_URL automatically
    # We also support SPRING_DATASOURCE_URL as fallback
    url: ${DATABASE_URL:${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb}}
    username: ${PGUSER:${SPRING_DATASOURCE_USERNAME:sa}}
    password: ${PGPASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  # Disable Redis on free tier (no Redis add-on)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  cache:
    type: simple

jwt:
  secret: ${JWT_SECRET:please-set-a-strong-secret-in-railway-env-vars}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

server:
  port: ${PORT:8080}    # Railway injects PORT automatically

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.autorabit: INFO
    org.springframework.security: WARN

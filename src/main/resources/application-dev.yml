spring:
  config:
    activate:
      on-profile: dev

  # H2 In-Memory Database
  datasource:
    url: jdbc:h2:mem:pipelinedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  # Disable Redis for dev (use no-op cache)
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 1000ms
      connect-timeout: 1000ms

  cache:
    type: none

logging:
  level:
    com.autorabit: DEBUG
    org.hibernate.SQL: DEBUG
